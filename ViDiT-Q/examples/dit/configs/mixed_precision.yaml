model:
    model_id: "opensora"
    model_type: 'opensora'  # ['sd','sdxl']
calib_data:
    save_path: './calib_data.pth'
weight:
  n_bits: [2,4,8]
  i_bitwidth: 1
  group: 'tensor'
  sym: False
act:
  n_bits: [2,4,8]
  i_bitwidth: 2
  group: 'tensor' 
  sym: True
mixed_precision:  # the unmentioned layers are remained the main bitwidth (n_bits[i_bitwidth])
  weight:
    layer_name_regex: ['mlp','','','attn']  # [FP, [n_bits]]
  act:
    layer_name_regex: ['mlp','','','attn']

  
