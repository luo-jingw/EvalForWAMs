# Phase 28: ViDiT-Q/QServe W4A8 with the paper-namesake "ViDiT" method
# (SmoothQuant + QuaRoT) stacked on top of W4 weights. Mirrors
# w8a8_dynamic.yaml but flips weight_bits to 4 and weight_pack to
# QServe layout (handled inside ptq._pack_int4_qserve, not via a
# new code branch).
# Quant convention (matches QServe upstream): unsigned int4 weight,
# w_real = scale * (w_int_unsigned - zp_unsigned). Distinct from W8A8's
# signed (w_int + zp) convention; see ptq._per_channel_asym_quant_unsigned.
# Per-token symmetric dynamic INT8 activation, same as W8A8 path.
# Order of preprocessing (PTQ time then runtime, matches viditq_quant_layer
# upstream + W8A8 viditq path):
#   PTQ:     W <- (W * channel_mask) @ H / sqrt(C_in)  then unsigned asym quant
#   runtime: x <- (x / channel_mask) @ H / sqrt(C_in)  then per-token sym act quant

remain_fp_regex: "patch_embedding_mlp|action_embedder|proj_out|action_proj_out|condition_embedder|condition_embedder_action|scale_shift_table|time_proj"

weight_bits: 4
weight_sym: false
act_bits: 8
act_sym: true
weight_pack: qserve_w4

# Phase 36 SmoothQuant + Phase 37 QuaRoT, composed.
smooth_quant: true
smooth_alpha: 0.99
calib_data_path: /home/arash/EvalForWAMs/results/calib_data/calib_data.pth
quarot: true
quarot_seed_base: 0
