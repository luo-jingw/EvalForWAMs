# Layer/precision config for ViDiT-Q W8A8 (kernel path, Phase 24d+).
# Per-channel ASYMMETRIC weight quant (matches ViDiT-Q upstream default),
# per-token symmetric dynamic activation. Applies only to nn.Linear inside
# WanTransformerBlock. Excluded layers (kept FP) are small outer/embedding
# linears; quantizing them hurts SR disproportionately to the parameter saving.

remain_fp_regex: "patch_embedding_mlp|action_embedder|proj_out|action_proj_out|condition_embedder|condition_embedder_action|scale_shift_table|time_proj"

weight_bits: 8
weight_sym: false        # Phase 24d only supports asym; flipping requires code support
act_bits: 8
act_sym: true            # ViDiT-Q activation quant is always symmetric
weight_pack: int8
