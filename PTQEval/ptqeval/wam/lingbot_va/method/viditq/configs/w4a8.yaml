# Layer/precision config for ViDiT-Q W4A8 (kernel path, Phase 24d+).
# Per-channel ASYMMETRIC INT4 weight quant (matches ViDiT-Q upstream default),
# per-token symmetric dynamic INT8 activation. Weight tensor packs 2 nibbles
# per INT8 byte (little-endian: low nibble = index 2k, high nibble = index 2k+1).
# Excluded layers and target scope match w8a8.yaml.

remain_fp_regex: "patch_embedding_mlp|action_embedder|proj_out|action_proj_out|condition_embedder|condition_embedder_action|scale_shift_table|time_proj"

weight_bits: 4
weight_sym: false        # Phase 24d only supports asym; flipping requires code support
act_bits: 8
act_sym: true            # ViDiT-Q activation quant is always symmetric
weight_pack: int4_two_per_byte
