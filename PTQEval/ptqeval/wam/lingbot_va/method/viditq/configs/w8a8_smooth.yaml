# Layer/precision config for ViDiT-Q W8A8 + SmoothQuant (Phase 36).
# Per-channel ASYMMETRIC INT8 weight quant (Phase 24d) + per-token symmetric
# dynamic INT8 activation (Phase 26a-1). PTQ-time preprocessing:
#   channel_mask = (|W|.amax(0)^alpha) / (act_absmax^(1-alpha))
#   W_smooth = W * channel_mask           (per-input-channel rescale)
#   runtime: x_smooth = x / channel_mask  (matching inverse before quant)
# act_absmax read from calib_data_path, produced by Phase 31:
#   bash run_eval.sh single  (with CALIBRATE_OUT=path/to/calib_data.pth and
#   VARIANT unset so the bf16 server gets the hooks).

remain_fp_regex: "patch_embedding_mlp|action_embedder|proj_out|action_proj_out|condition_embedder|condition_embedder_action|scale_shift_table|time_proj"

weight_bits: 8
weight_sym: false
act_bits: 8
act_sym: true
weight_pack: int8

# Phase 36 SmoothQuant.
smooth_quant: true
smooth_alpha: 0.99
calib_data_path: results/calib_data/calib_data.pth
