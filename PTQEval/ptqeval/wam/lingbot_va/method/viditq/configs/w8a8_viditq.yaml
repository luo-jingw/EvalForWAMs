# Layer/precision config for ViDiT-Q W8A8 + ViDiT combined method (Phase 38).
# This is the paper-namesake "ViDiT-Q" method itself: per-channel ASYMMETRIC
# INT8 weight quant + per-token symmetric dynamic INT8 activation, STACKED
# with SmoothQuant alpha-blending (Phase 36) AND QuaRoT Hadamard rotation
# (Phase 37). Order matches viditq_quant_layer.py:47-48 / :62-63 exactly:
#   PTQ:     W <- (W * channel_mask) @ H / sqrt(C_in)    then per-channel asym quant
#   runtime: x <- (x / channel_mask) @ H / sqrt(C_in)    then per-token sym act quant
# Phase 27/34 are NOT "ViDiT-Q reproduction" -- only this variant qualifies.

remain_fp_regex: "patch_embedding_mlp|action_embedder|proj_out|action_proj_out|condition_embedder|condition_embedder_action|scale_shift_table|time_proj"

weight_bits: 8
weight_sym: false
act_bits: 8
act_sym: true
weight_pack: int8

# Phase 36 SmoothQuant + Phase 37 QuaRoT, composed.
smooth_quant: true
smooth_alpha: 0.99
calib_data_path: /home/arash/EvalForWAMs/results/calib_data/calib_data.pth
quarot: true
quarot_seed_base: 0
