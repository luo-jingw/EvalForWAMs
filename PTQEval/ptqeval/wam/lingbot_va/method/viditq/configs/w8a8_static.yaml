# Layer/precision config for the faithful paper-namesake "ViDiT-Q" W8A8
# method (Phase 33). Composes:
#   1. Phase 36 SmoothQuant alpha-blending  (W *= s, x /= s)
#   2. Phase 37 QuaRoT Hadamard rotation    (W @ H, x @ H)
#   3. Phase 33 STATIC activation quant     (per-layer scalar from calib;
#                                            runtime kernel skips amax)
# Order matches viditq_quant_layer.py: smooth -> rotate -> quant. The
# static scale is computed on the POST-smooth distribution (i.e.
# act_absmax / channel_mask) so it bounds what x_smooth actually sees
# at runtime; rotation is orthogonal so post-rotation max equals
# pre-rotation max in expectation (no separate compensation needed).
#
# This is the ONLY variant that qualifies as a strict ViDiT-Q upstream
# W8A8 reproduction (Phase 27/34/38 dynamic-act variants are "ViDiT-Q
# inspired but with dynamic activation").

remain_fp_regex: "patch_embedding_mlp|action_embedder|proj_out|action_proj_out|condition_embedder|condition_embedder_action|scale_shift_table|time_proj"

weight_bits: 8
weight_sym: false
act_bits: 8
act_sym: true
weight_pack: int8

# Phase 36 SmoothQuant + Phase 37 QuaRoT + Phase 33 static activation.
smooth_quant: true
smooth_alpha: 0.99
calib_data_path: /home/arash/EvalForWAMs/results/calib_data/calib_data.pth
quarot: true
quarot_seed_base: 0
static_act: true
